  <script>
    (function() {
      const amountDisplay = document.getElementById('amount-display');
      const amountPrompt = document.getElementById('amount-prompt');
      const inputProgressBar = document.getElementById('input-progress-bar');
      const keyboardKeys = document.querySelectorAll('.keyboard-key[data-key]');
      const backspaceKey = document.getElementById('backspace');
      const clearAllKey = document.getElementById('clear-all');
      const confirmPayButton = document.getElementById('confirm-pay');
      const quickAmounts = document.querySelectorAll('.quick-amount');
      const paymentMethods = document.querySelectorAll('.payment-method');
      
      let amount = '0';
      let selectedQuickAmount = null;
      let selectedPaymentMethod = 'alipay';

      function formatAmount(amountStr) {
        const amountNum = parseFloat(amountStr);
        if (isNaN(amountNum)) return amountStr;
        return amountNum.toLocaleString('zh-CN', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function updateDisplay() {
        const formattedAmount = formatAmount(amount);
        amountDisplay.textContent = `¥${formattedAmount}`;

        const amountValue = parseFloat(amount);

        // 进度条
        let progress = 0;
        if (amountValue >= 5000) {
          progress = 100;
        } else if (amountValue >= 10) {
          progress = (amountValue / 5000) * 100;
        } else if (amountValue > 0) {
          progress = (amountValue / 10) * 30;
        }
        inputProgressBar.style.width = `${progress}%`;

        // 验证金额
        const isValid = amountValue >= 10 && amountValue <= 5000;

        if (isValid) {
          inputProgressBar.classList.add('bg-success');
          inputProgressBar.classList.remove('bg-primary/50', 'bg-danger');
          amountPrompt.textContent = '输入正确，请确认支付';
          amountPrompt.classList.remove('text-neutral-600', 'text-warning');
          amountPrompt.classList.add('text-success');
        } else if (amountValue > 0) {
          inputProgressBar.classList.add('bg-danger');
          inputProgressBar.classList.remove('bg-primary/50', 'bg-success');
          if (amountValue < 10) {
            amountPrompt.textContent = '金额不足10元';
            amountPrompt.classList.remove('text-neutral-600', 'text-success');
            amountPrompt.classList.add('text-warning');
          } else {
            amountPrompt.textContent = '金额超出限额';
            amountPrompt.classList.remove('text-neutral-600', 'text-success');
            amountPrompt.classList.add('text-warning');
          }
        } else {
          inputProgressBar.classList.add('bg-primary/50');
          inputProgressBar.classList.remove('bg-danger', 'bg-success');
          amountPrompt.textContent = '请输入付款金额';
          amountPrompt.classList.remove('text-warning', 'text-success');
          amountPrompt.classList.add('text-neutral-600');
        }
      }

      // 虚拟键盘
      keyboardKeys.forEach(key => {
        key.addEventListener('click', () => {
          const keyValue = key.getAttribute('data-key');
          if (amount === '0') {
            amount = keyValue;
          } else {
            if (amount.length < 6) {
              amount += keyValue;
            }
          }
          if (parseInt(amount) > 5000) amount = '5000';
          updateDisplay();
        });
      });

      // 删除一位
      backspaceKey.addEventListener('click', () => {
        if (amount === '0') return;
        amount = amount.slice(0, -1);
        if (amount === '') amount = '0';
        updateDisplay();
      });

      // 清空金额
      clearAllKey.addEventListener('click', () => {
        if (amount === '0') return;
        amount = '0';
        if (selectedQuickAmount) {
          selectedQuickAmount.classList.remove('bg-primary', 'text-white', 'ring-2', 'ring-primary/70');
          selectedQuickAmount.classList.add('bg-primary/10', 'text-primary');
          selectedQuickAmount = null;
        }
        updateDisplay();
      });

      // 确认支付
      confirmPayButton.addEventListener('click', () => {
        checkAndSubmitPayment();
      });

      // 快捷金额按钮
      quickAmounts.forEach(button => {
        button.addEventListener('click', () => {
          const quickAmount = button.getAttribute('data-amount');
          amount = quickAmount;
          
          if (selectedQuickAmount) {
            selectedQuickAmount.classList.remove('bg-primary', 'text-white', 'ring-2', 'ring-primary/70');
            selectedQuickAmount.classList.add('bg-primary/10', 'text-primary');
          }
          
          selectedQuickAmount = button;
          button.classList.remove('bg-primary/10', 'text-primary');
          button.classList.add('bg-primary', 'text-white', 'ring-2', 'ring-primary/70');
          
          updateDisplay();
        });
      });

      // 支付方式选择
      paymentMethods.forEach(method => {
        method.addEventListener('click', () => {
          paymentMethods.forEach(m => {
            m.classList.remove('border-primary', 'bg-primary/5', 'border-success', 'bg-success/5');
            m.classList.add('border-neutral-200', 'bg-white/80');
            const indicator = m.querySelector('.rounded-full.border-2');
            const innerCircle = m.querySelector('.rounded-full.border-2 div');
            if (indicator) {
              indicator.classList.remove('border-primary', 'border-success');
              indicator.classList.add('border-neutral-300');
            }
            if (innerCircle) {
              innerCircle.classList.remove('bg-primary', 'bg-success');
              innerCircle.classList.add('bg-transparent');
            }
          });
          
          if (method.querySelector('svg')) {
            selectedPaymentMethod = 'alipay';
            method.classList.add('border-primary', 'bg-primary/5');
            const indicator = method.querySelector('.rounded-full.border-2');
            const innerCircle = method.querySelector('.rounded-full.border-2 div');
            if (indicator) {
              indicator.classList.add('border-primary');
              indicator.classList.remove('border-neutral-300');
            }
            if (innerCircle) {
              innerCircle.classList.add('bg-primary');
              innerCircle.classList.remove('bg-transparent');
            }
          } else if (method.querySelector('.fa-wechat')) {
            selectedPaymentMethod = 'wxpay';
            method.classList.add('border-success', 'bg-success/5');
            const indicator = method.querySelector('.rounded-full.border-2');
            const innerCircle = method.querySelector('.rounded-full.border-2 div');
            if (indicator) {
              indicator.classList.add('border-success');
              indicator.classList.remove('border-neutral-300');
            }
            if (innerCircle) {
              innerCircle.classList.add('bg-success');
              innerCircle.classList.remove('bg-transparent');
            }
          }
        });
      });

      // 显示消息提示
      function showMessage(message) {
        const modal = document.getElementById('message-modal');
        const messageText = document.getElementById('message-text');
        const messageIcon = document.getElementById('message-icon');
        const okBtn = document.getElementById('message-ok');

        if (modal && messageText && messageIcon) {
          messageText.textContent = message;

          // 根据消息类型动态调整图标和颜色
          if (message.includes('失败') || message.includes('超时') || message.includes('错误')) {
            messageIcon.className = 'fa fa-times-circle';
            messageIcon.style.color = '#FF5252';
            okBtn.style.background = '#FF5252';
          } else if (message.includes('成功')) {
            messageIcon.className = 'fa fa-check-circle';
            messageIcon.style.color = '#00C48C';
            okBtn.style.background = '#00C48C';
          } else {
            messageIcon.className = 'fa fa-info-circle';
            messageIcon.style.color = '#0052D9';
            okBtn.style.background = '#0052D9';
          }

          modal.style.display = 'block';

          // 关闭弹窗函数
          const closeModal = () => {
            modal.style.display = 'none';
            okBtn.removeEventListener('click', closeModal);
          };

          // 确定按钮事件
          okBtn.addEventListener('click', closeModal);
        }
      }

      // 显示/隐藏加载动画
      function showLoading(show) {
        const loadingModal = document.getElementById('loading-modal');
        if (loadingModal) {
          loadingModal.style.display = show ? 'block' : 'none';
        }
      }

      // 当金额有效且选择了支付方式时，在控制台输出支付数据
      let isSubmitting = false;
      function checkAndSubmitPayment() {
        if (isSubmitting) return;

        const amountValue = parseFloat(amount);
        if (amountValue >= 10 && amountValue <= 5000) {
          isSubmitting = true;
          showLoading(true);

          const orderData = {
            amount: amount,
            payment_method: selectedPaymentMethod,
            status: 'paid'
          };
          console.log('支付数据:', JSON.stringify(orderData, null, 2));
          console.log('原始数据:', orderData);

          const formData = new FormData();
          formData.append('fee', orderData.amount);
          formData.append('method', orderData.payment_method);

          fetch('', {
            method: 'POST',
            body: formData
          })
          .then(response => response.json())
          .then(data => {
              if(data.code != 1){
                  showLoading(false);
                  return showMessage(data.msg);
              }

              /*setTimeout(() => {
                window.location.href = data.data.url;
              }, 500);*/
              queryOrder(data.data.orderid);

            console.log('提交成功:', data);
          })
          .catch(error => {
            console.error('提交失败:', error);
            showLoading(false);
            showMessage('提交失败，请重试');

          })
          .finally(() => {
            isSubmitting = false;
          });
        }
      }

      async function queryOrder($orderid) {

        var response = await fetch('/api/pay/query_ev_order?orderid=' + $orderid);

        if(!response.ok) {
            setTimeout(() => {
                queryOrder($orderid)
            }, 1000);
            return;
        }

        const result = await response.json();

        if(result.code == 0){

            showLoading(false);
            
            return showMessage(result.msg);

        }
    
        $('.loading-text').text('等待时间' + result.data.timeout +'秒');

        if(result.data.status == 2){
            
            showLoading(false);
            
            if(result.data.payinfo.url){
                window.location.href = result.data.payinfo.url;
                return;
            }

            if(result.data.payinfo.qrcode){
                showQRCode(result.data.payinfo.qrcode);
                return;
            }

            return;
        }

        setTimeout(() => {
            queryOrder($orderid)
        }, 1500);

      }

      // 显示二维码弹窗
      function showQRCode(qrcodeUrl) {
        const modal = document.getElementById('qrcode-modal');
        const qrcodeImage = document.getElementById('qrcode-image');

        if (modal && qrcodeImage) {
          qrcodeImage.src = qrcodeUrl;
          modal.style.display = 'block';
        }
      }

      // 检测客户端类型
    function detectClient() {
      const userAgent = navigator.userAgent.toLowerCase();

      // 检测支付宝
      if (userAgent.indexOf('alipay') !== -1 || userAgent.indexOf('aliapp') !== -1) {
        return 'alipay';//{ client: 'alipay', userAgent: navigator.userAgent };
      }

      // 检测微信
      if (userAgent.indexOf('micromessenger') !== -1) {
        return 'weixin'; //{ client: 'weixin', userAgent: navigator.userAgent };
      }
      // 其他浏览器

      return 'browser'; //{ client: 'browser', userAgent: navigator.userAgent };
    }
        //showBrowserGuide();
      // 显示引导使用默认浏览器弹窗
      function showBrowserGuide() {
          
         if(detectClient() != 'weixin'){
            return;
         }
          
        const modal = document.getElementById('browser-guide-modal');
        if (modal) {
          modal.style.display = 'block';
        }
      }

      // 关闭浏览器引导弹窗
      function closeBrowserGuide() {
        const modal = document.getElementById('browser-guide-modal');
        if (modal) {
          modal.style.display = 'none';
        }
      }

      // 根据客户端自动选择支付方式
      function autoSelectPaymentMethod() {
        const clientType = detectClient();
        const paymentMethods = document.querySelectorAll('.payment-method');

        // 支付宝客户端:隐藏微信支付,选中支付宝
        if (clientType === 'alipay') {
          paymentMethods.forEach(method => {
            if (method.querySelector('.fa-wechat')) {
              method.style.display = 'none';
            } else if (method.querySelector('svg')) {
              // 选中支付宝
              selectedPaymentMethod = 'alipay';
              method.classList.add('border-primary', 'bg-primary/5');
              method.classList.remove('border-neutral-200', 'bg-white/80');
              const indicator = method.querySelector('.rounded-full.border-2');
              const innerCircle = method.querySelector('.rounded-full.border-2 div');
              if (indicator) {
                indicator.classList.add('border-primary');
                indicator.classList.remove('border-neutral-300');
              }
              if (innerCircle) {
                innerCircle.classList.add('bg-primary');
                innerCircle.classList.remove('bg-transparent');
              }
            }
          });
        }
        // 微信客户端:隐藏支付宝,选中微信支付
        else if (clientType === 'weixin') {
          paymentMethods.forEach(method => {
            if (method.querySelector('svg')) {
              method.style.display = 'none';
            } else if (method.querySelector('.fa-wechat')) {
              // 选中微信支付
              selectedPaymentMethod = 'wxpay';
              method.classList.add('border-success', 'bg-success/5');
              method.classList.remove('border-neutral-200', 'bg-white/80');
              const indicator = method.querySelector('.rounded-full.border-2');
              const innerCircle = method.querySelector('.rounded-full.border-2 div');
              if (indicator) {
                indicator.classList.add('border-success');
                indicator.classList.remove('border-neutral-300');
              }
              if (innerCircle) {
                innerCircle.classList.add('bg-success');
                innerCircle.classList.remove('bg-transparent');
              }
            }
          });
        }
        // 其他客户端不做改变
      }

      // 初始化
      updateDisplay();
      // 调用自动选择支付方式方法
      autoSelectPaymentMethod();
    })();
  </script>
</body>
</html>
