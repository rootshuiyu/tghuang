<script src="/assets/qrcode.min.js"></script>

<script>

var $_GET = (function(){
    var url = window.document.location.href.toString();
    var u = url.split("?");
    if(typeof(u[1]) == "string"){
        u = u[1].split("&");
        var get = {};
        for(var i in u){
            var j = u[i].split("=");
            get[j[0]] = j[1];
        }
        return get;
    } else {
        return {};
    }
})();

/*模板引擎*/
(function(exports) {

	exports.SimBind = function(options) {
		var self = this;

		this.render = function() {
			var el = document.querySelector(this.el);
			var children = el.childNodes;
			var secondChild = children && children[1];

			if (secondChild && secondChild.attributes && secondChild.attributes['data-repeat']) {
				var html = '';
				for (var j in this.data) {
					html += this.attachData(this.template, this.data[j]);
				}
				el.innerHTML = html;
			} else {
				el.innerHTML = this.attachData(this.template, this.data);
			}
		};

		this.attachData = function(el, data) {
			var fragment = '';
			for (var key in data) {
				var reg = new RegExp('{{' + key + '}}', 'g');
				fragment = (fragment || el).replace(reg, data[key]);
			}
			return fragment;
		};

		Object.defineProperty(this, 'data', {
			get: function() {
				return self._dataProxy || self._data;
			},
			set: function(val) {
				if (!self._dataProxy || self._dataProxy !== val) {
					self._data = val;
					self._dataProxy = self.createProxy(val, self.render.bind(self));
					self.render();
				}
			}
		});

		this.createProxy = function(obj, renderCallback) {
			if (typeof obj !== 'object' || obj === null) {
				return obj;
			}

			return new Proxy(obj, {
				set: function(target, property, value) {
					target[property] = value;
					renderCallback();
					return true;
				}
			});
		};

		if (options && options.el) {
			this.el = options.el;
			this.template = document.querySelector(this.el).innerHTML;
			this.data = options.data;
		}
	}
})(window);
/*模板引擎END*/

vm = new SimBind({
		el:'#app',
		data:{
		    'error_title' : '订单已超时',
		    'error_info' : '支付时间已过期，请重新下单',
		    'status0'  : '',
		    'status1' : 'none',
		    'status2' : 'none',
		    'status3' : 'none',
		    'status10' : 'none',
		    'times' : 60,
		    'payModel' : 'none',
		    'qrModel' : 'none',
		    'payData' : null,
		    'qrData'  : '<i class="fa fa-qrcode text-neutral-300 text-6xl sm:text-7xl"></i>',
		    'fee'     : null
		}
	});

start();
function start() {
    
  queryOrder()
    
}
	
async function queryOrder() {
        $orderid = $_GET['orderid'];
        var response = await fetch('/api/pay/query_ev_order?orderid=' + $orderid);
        
        if(!response.ok) {
            setTimeout(() => {
                queryOrder($orderid)
            }, 1000);
            return;
        }

        const result = await response.json();
        if(result.code != 1){
            render();
            vm.data.payModel = 'none';
            vm.data.qrModel = 'none';
            vm.data.error_title = result.msg;
            vm.data.error_info = '';
            vm.data.status3 = '';
            
            return vm.data.status1 = '';
        }
        
        order = result.data;
        
        if(order.status == 0 || order.status == 1 || order.status == 2){
           vm.data.times = order.timeout; 
        }
        
        if(order.status == 2){
            
            if(vm.data.fee == null){
                render();
            }
            
            vm.data.status2 = '';

            vm.data.fee = order.fee;
            
            if(order.payinfo.url){
                if(!vm.data.payData){
                    vm.data.payModel = '';
                    vm.data.payData = order.payinfo.url;
                }
                window.location.href = order.payinfo.url;
                return;
            }
            
            if(order.payinfo.qrcode){
                if(vm.data.qrModel == 'none'){
                    vm.data.qrModel = '';
                    qrBase64 = await generateQRCode(order.payinfo.qrcode);
                    //console.log('数据'+ qrBase64)
                    vm.data.qrData = '<img src="'+ qrBase64 +'">';
                }
                
            }
            
        }
        
        if(order.status == 3){
            render();
            vm.data.payModel = 'none';
            vm.data.qrModel = 'none';
            vm.data.status3 = '';
        }
        
        if(order.status == 10){
            render();
            vm.data.payModel = 'none';
            vm.data.qrModel = 'none';
            vm.data.status10 = '';
        }
        setTimeout(() => {
                queryOrder($orderid)
            }, 1000);
        
          
      }
      
function render(){
   
   if(vm.data.status0 != 'none'){
       vm.data.status0 =  'none';
   }
   if(vm.data.status1 != 'none'){
       vm.data.status1 =  'none';
   }
   if(vm.data.status2 != 'none'){
       vm.data.status2 =  'none';
   }
   if(vm.data.status3 != 'none'){
       vm.data.status3 =  'none';
   }
   if(vm.data.status10 != 'none'){
       vm.data.status10 =  'none';
   }

}

function payPull(){
    
    window.location.href = vm.data.payData;
    
}

// 生成二维码函数，返回 base64 格式
function generateQRCode(text) {
  console.log('=== 开始生成二维码 ===');
  console.log('输入文本:', text);

  // 检查输入文本是否有效
  if (!text || text === '' || text === null || text === undefined) {
    console.error('二维码内容为空:', text);
    return Promise.resolve(null);
  }

  // 使用 QRCode 库生成二维码
  try {
    // 创建临时离屏容器
    const tempContainer = document.createElement('div');
    tempContainer.style.position = 'absolute';
    tempContainer.style.top = '-9999px';
    tempContainer.style.left = '-9999px';
    tempContainer.style.width = '160px';
    tempContainer.style.height = '160px';
    tempContainer.style.backgroundColor = '#ffffff';
    document.body.appendChild(tempContainer);

    const qr = new QRCode(tempContainer, {
      text: String(text),
      width: 160,
      height: 160,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.L
    });


    // 延迟处理生成的元素，确保 QRCode 完成渲染
    return new Promise((resolve, reject) => {
      setTimeout(() => {
        const img = tempContainer.querySelector('img');
        const canvas = tempContainer.querySelector('canvas');

        console.log('img:', img);
        console.log('canvas:', canvas);

        let base64Result = null;

        if (img) {
          base64Result = img.src;
          
        } else if (canvas) {
          base64Result = canvas.toDataURL('image/png');
          
        }

        // 移除临时容器
        tempContainer.remove();

        console.log('=== 二维码生成完成 ===');

        if (base64Result) {
          resolve(base64Result);
        } else {
          reject(new Error('无法获取二维码 base64 数据'));
        }
      }, 100);
    });

  } catch (error) {
    console.error('生成二维码失败:', error);
    return Promise.resolve(null);
  }
}









</script>
