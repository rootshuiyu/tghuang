<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量聊天系统</title>
    <style>
        body {
            font-family: Roboto, "San Francisco", "Helvetica Neue", Helvetica, Arial, PingFangSC-Light, "Hiragina Sans GB", "WenQuanYi Micro Hei", "microsoft yahei ui", "microsoft yahei", sans-serif;
            max-width: 800px;
            margin: 0 auto;
            background-color: #efefef;
        }
        .chat-container {
            
            overflow: hidden;
        }
        .chat-header {
            background-color: #006eff;
            color: white;
            padding: 4px;
            text-align: center;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
            width: fit-content;
            word-break: break-word;
            display: flex;
            align-items: flex-start;
        }
        .message-user {
            font-weight: bold;
            color: #006eff;
            width: 80px;
            flex-shrink: 0;
            text-align: right;
            padding-right: 10px;
        }
        .message-content-container {
            flex-grow: 1;
        }
        .message-content {
            background-color: #ffffff;
            padding: 10px;
            border-radius: 8px;
            width: fit-content;
            max-width: 100%;
            font-size: 15px;
        }
        .message-timestamp {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            text-align: left;
        }
        .chat-input {
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        textarea {
            background-color: #0000;
            font-family: inherit;
            font-size: 15px;
            resize: none;
            padding: 10px;
            /*border: 1px solid #ddd;*/
            border: none;
            border-radius: 4px;
            margin-bottom: 10px;
            height: 80px;
            outline: none;
        }
        button {
            background-color: #006eff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            align-self: flex-end;
            width: 100px;
        }
        button:hover {
            background-color: #026df9;
        }
        .clear-btn {
            background-color: #ff6b6b;
            margin-right: 10px;
        }
        .clear-btn:hover {
            background-color: #ee5253;
        }
        .buttons {
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <p>当前用户: <span id="username">加载中...</span></p>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
            <textarea id="message-input" placeholder="输入消息..."></textarea>
            <div class="buttons">
                <button class="clear-btn" id="clear-btn">清空消息</button>
                <button id="send-btn">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 从URL获取用户名
        function getUsernameFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('user') || 'Guest';
        }

        // 用户名
        const username = getUsernameFromUrl();
        document.getElementById('username').textContent = username;

        // 最后一条消息的ID
        let lastMessageId = '';

        // 获取消息
        function getMessages() {
            fetch(`api.php?action=get&lastId=${lastMessageId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        
                        if (data.messages.length > 0) {
                            const chatMessages = document.getElementById('chat-messages');
                            data.messages.forEach(message => {
                                const messageElement = document.createElement('div');
                                messageElement.className = 'message';

                                const userElement = document.createElement('div');
                                userElement.className = 'message-user';
                                userElement.textContent = message.user;

                                const contentContainer = document.createElement('div');
                                contentContainer.className = 'message-content-container';

                                const contentElement = document.createElement('div');
                                contentElement.className = 'message-content';
                                // 将换行符转换为HTML换行标签
                                contentElement.innerHTML = message.message.replace(/\n/g, '<br>');

                                const date = new Date(message.timestamp * 1000);
                                const timestampElement = document.createElement('div');
                                timestampElement.className = 'message-timestamp';
                                timestampElement.textContent = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}:${date.getSeconds().toString().padStart(2, '0')}`;

                                contentContainer.appendChild(contentElement);
                                contentContainer.appendChild(timestampElement);

                                messageElement.appendChild(userElement);
                                messageElement.appendChild(contentContainer);

                                chatMessages.appendChild(messageElement);

                                // 更新最后一条消息的ID
                                lastMessageId = message.id;
                            });

                            // 滚动到底部
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                            
                            
                            
                        }
                        setTimeout(() => {
                                getMessages();
                            }, 500);
                        
                    }
                })
                .catch(error => console.error('Error:', error));
        }
        
        reMessages();
        
        function reMessages(){
            
            getMessages();
            
        }

        // 发送消息
        function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();

            if (message) {
                const formData = new FormData();
                formData.append('user', username);
                formData.append('message', message);

                fetch('api.php?action=send', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            messageInput.value = '';
                            //getMessages(); // 获取最新消息
                        }
                    })
                    .catch(error => console.error('Error:', error));
            }
        }

        // 清空消息
        function clearMessages() {
            if (confirm('确定要清空所有消息吗？')) {
                fetch('api.php?action=clear')
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            document.getElementById('chat-messages').innerHTML = '';
                            lastMessageId = '';
                        }
                    })
                    .catch(error => console.error('Error:', error));
            }
        }

        // 初始化
        

        // 定时获取新消息（每3秒）
        

        // 事件监听
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('clear-btn').addEventListener('click', clearMessages);

        // 按Enter发送消息（Shift+Enter换行）
        document.getElementById('message-input').addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
