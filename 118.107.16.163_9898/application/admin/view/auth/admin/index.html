<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="yui-btn btn-refresh" title="{:__('Refresh')}" ><i class="fa fa-refresh"></i> </a>
                        <a href="javascript:;" class="yui-btn btn-add {:$auth->check('auth/admin/add')?'':'hide'}" title="{:__('Add')}" ><i class="fa fa-plus"></i> {:__('添加成员')}</a>
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('auth/admin/edit')}"
                           data-operate-del="{:$auth->check('auth/admin/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {

    // 初始化表格参数配置
            Table.api.init({
                extend: {
                    index_url: 'auth/admin/index',
                    add_url: 'auth/admin/add',
                    edit_url: 'auth/admin/edit',
                    del_url: 'auth/admin/del',
                    multi_url: 'auth/admin/multi',
                }
            });

            var table = $("#table");

            //在表格内容渲染完成后回调的事件
            table.on('post-body.bs.table', function (e, json) {
                $("tbody tr[data-index]", this).each(function () {
                    if (parseInt($("td:eq(1)", this).text()) == Config.admin.id) {
                        $("input[type=checkbox]", this).prop("disabled", true);
                    }
                });
            });

            // 初始化表格
            table.bootstrapTable({
                url: $.fn.bootstrapTable.defaults.extend.index_url,
                columns: [
                    [
                        {field: 'id', title: 'ID', searchable :false},
                        
                        {eq name="is_boss" value="true"}
                            {field: 'groups_text', title: __('Group'), operate:false, formatter: Table.api.formatter.label,visible : false},
                        {/eq}
                        
                        {field: 'pid', title: __('上级'),
                            addClass: "selectpicker",
                            extend : 'data-live-search="true"',
                            searchList: seachlist.user,
                            formatter: function(value, row){
                                if(row.pid == 0){
                                    return '-';
                                }
                                return seachlist.user[value];
                            }
                        },
                        
                        {field: 'nickname', title: __('Nickname'),
                            align :'left',
                            formatter: function(value, row){
                           
                                if(row.groups_text == '核销'){
                                    str = '<label style="display:inline-block; padding:3px 8px; font-size:12px; color:#fff; background:#1976d2;  sans-serif; letter-spacing:0.5px;">核销</label>';
                                }else{
                                    str = '<label style="display:inline-block; padding:3px 8px; font-size:12px; color:#fff; background:#ff6d00; sans-serif; letter-spacing:0.5px;">商户</label>'
                                }
                                return str +'  '+ value;
                            }
                        },
                        
                        {field: 'username', title: __('Username')},
                        
                        
                        {eq name="is_boss" value="true"}
                        {field: 'fee', title: __('账户余额'), searchable :false},
                        {/eq}
                        
                        {field: 'summary.day', title: __('今日收入'), searchable :false},
                        
                        {field: 'summary.tday', title: __('昨日收入'), searchable :false},
                        
                         {field: 'is_share', title: __("共享核销"), formatter: Table.api.formatter.toggle },
                       
                        {field: 'switch', title: __("匹配开关"),
                            searchList: seachlist.switch,
                            formatter: Table.api.formatter.toggle
                        },
                        
                       
                        
                        {field: 'status', title: __("账号状态"), searchList: {"normal":__('Normal'),"hidden":__('Hidden')}, formatter: Table.api.formatter.status},
                        
                        {
                            field: 'operate',
                            width: "150px",
                            title: __('Operate'),
                            table: table,
                            events: Table.api.events.operate,
                            {eq name="is_boss" value="true"}
                            buttons: [
                                {
                                    name: 'detail',
                                    title: __('金额变动'),
                                    text : '余额变动',
                                    classname: 'yui-link btn-dialog',
                                    icon: 'fa fa-paypal',
                                    url: 'yunos/fund/add',
                                    callback: function (data) {
                                        
                                    }
                                },
                                
                            ],
                            {/eq}
                            formatter: Table.api.formatter.operate
                        },
                        {field: 'logintime', title: __('Login time'), formatter: Table.api.formatter.datetime, operate: 'RANGE', addclass: 'datetimerange', sortable: true, searchable :false},
                        //操作栏,默认有编辑、删除或排序按钮,可自定义配置buttons来扩展按钮
                    ]
                ]
            });

            // 为表格绑定事件
            Table.api.bindevent(table);
});

}
</script>
