<script>

const $PageApp = () => {
    define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {

      const menulist = {:json_encode($menulist,true)};
      console.log(menulist)
      $tpl.view('topmenu',menulist);
      
      $(document).on("click", ".menu-group", function () {
        //$('.tea-menu__list li').removeClass('is-selected');
        
        if ($(this).parent().hasClass("is-expanded")) {
            $(this).parent().removeClass("is-expanded")
            if($(this).siblings('.tea-menu__list').find('.is-selected').length > 0){
                $(this).parent().addClass("is-selected");
            }
            
        } else {
            //$(this).addClass("is-selected");
            $(this).parent().removeClass("is-selected").addClass("is-expanded");
        }
        
          
        });
        
        //点击顶部
        $(document).on("click", ".topmenu-item-content", function () {
            renderLeftMenu($(this).attr('data-node'));
            $('.tea-menu__title .tea-h2').text($(this).text());
        });
        
        leftvm = $tpl.view('leftmenu',[{'title':'概览'}]);
        function renderLeftMenu(app_node){
            for (item of menulist) {
              if(app_node == item.app_node){
                topmenu = item;
                childrenData = item.children;
              }
            }
            //console.log(childrenData)
            if(!childrenData){
                
                setAppUrl(topmenu.name,topmenu.app_node);
                
                return;
            }
            
            for (item2 of childrenData) {
              item2.childrenClass = 'item-btn' //当前层级class
              item2.childrenGroup = '' //是否有下级
              item2.childrenGroupBtn = '' // 
              item2.icondisplsy = 'none' // 
              
              if(item2.children){
                item2.childrenClass = 'item-group-btn';
                item2.childrenGroup = 'tea-menu__submenu';
                item2.childrenGroupBtn = 'menu-group' // 
                item2.icondisplsy = ''
              }
            }
            
            leftvm.data = childrenData;
            renderChildrenMenu(childrenData)
            
        }
        
        function renderChildrenMenu(childrenData){
            for (item of childrenData) {
                if(item.children){
                    renderChildrenHtml(item.children,item.app_node)
                }
            }
            
        }
        
        function renderChildrenHtml(childrenData,app_node){
            str = ''
            for (item of childrenData) {
                str += '<li class="">'
            	str += '<div class="tea-menu__item item-btn node-'+ item.app_node +'" data-url="'+ item.name +'" data-node="'+ item.app_node +'">';
            	str += '<div class="tea-menu__text">'+ item.title +'</div>';
            	str += '</div>';
            	str += '</li>';
            }
            
            $('.childrenlist' + app_node ).html(str);
            
        }
        
        $(document).on("click", ".btn-workbench", function () {
            window.location.hash = '#0';
            setAppUrl('../dashboard','0');
        });
        
        $(document).on("click", ".item-btn", function () {
            nodeId = $(this).attr('data-node');
            window.location.hash = '#' + nodeId;
            $('.tea-menu__body li').removeClass("is-selected")
            $(this).parent().addClass("is-selected")
            setAppUrl($(this).attr('data-url'),$(this).attr('data-node'))
        });
        
        function setAppUrl(data_url,app_node){
            
            $('.work-iframe').hide();
            workid = 'work-id-'+ app_node;
            
            if($('.'+ workid).length > 0){
                $('.' + workid).show();
                $app.loadingEnd('.tea-layout__content-body');
                return;
            }
            
            $app.loading('.tea-layout__content-body');
            
            iframe = '<iframe class="work-iframe '+ workid +'" src="'+ data_url +'" style="display:none;width:100%;height:100%"></iframe>'
            
            $('.tea-layout__content-body').append(iframe);
            
            $('.'+ workid).on('load', function() {
                console.log('iFrame has been loaded!');
                $app.loadingEnd('.tea-layout__content-body');
                $('.' + workid).show();
                // 可以在这里执行一些操作，比如修改 iframe 内容等
            });
            
        }
        
        renderRefresh();
        function renderRefresh(){
            hash = window.location.hash;
            hashValue = hash.substring(1);
            if(!hashValue){
                setAppUrl('dashboard','0')
                return;
            }
            let arrayFromString = hashValue.split('-');
            renderLeftMenu(arrayFromString[0]);
            
            nodeCount = arrayFromString.length;
            console.log(nodeCount)

            if(nodeCount == 3){
                $('.node-' + arrayFromString[0]+'-' + arrayFromString[1]).click();
            }
            
            $('.node-'+ hashValue).click();
            
            
        }
      
        
        
            
	});
		
};

</script>
