{include file="common/migu_head" /}
<div class="migu-login-page">
  <div class="migu-login-box">
    <h2>咪咕系统</h2>
    <div class="subtitle">代收核销管理后台</div>
    <form id="login-form" method="post" autocomplete="off">
      {:token()}
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" class="form-control" placeholder="请输入用户名" autofocus required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
      </div>
      {if condition="config('fastadmin.login_captcha')"}
      <div class="form-group">
        <label>验证码</label>
        <div class="d-flex align-items-center" style="gap:10px;">
          <input type="text" name="captcha" class="form-control" placeholder="请输入验证码" style="flex:1;" required>
          <img id="captcha-img" src="{:request()->root()}/index.php?s=/captcha" style="height:40px;cursor:pointer;border-radius:4px;" onclick="this.src='{:request()->root()}/index.php?s=/captcha&r='+Math.random();" title="点击刷新">
        </div>
      </div>
      {/if}
      <div class="form-group d-flex align-items-center justify-content-between">
        <label class="mb-0"><input type="checkbox" name="keeplogin" value="1"> <small>保持登录 ({$keeyloginhours}小时)</small></label>
      </div>
      <button type="submit" class="btn btn-migu btn-login">登 录</button>
    </form>
    <div class="login-footer">版权所有 &copy; {:date('Y')} 咪咕系统</div>
  </div>
</div>
<script src="/assets/libs/jquery/dist/jquery.min.js"></script>
<script>
$('#login-form').on('submit', function(e) {
    e.preventDefault();
    var $btn = $(this).find('button[type=submit]').prop('disabled', true).text('登录中...');
    $.ajax({
        url: '',
        type: 'POST',
        data: $(this).serialize(),
        dataType: 'json',
        success: function(res) {
            if (res.code === 1) {
                location.href = '{:url("index/index")}';
            } else {
                alert(res.msg || '登录失败');
                $btn.prop('disabled', false).text('登 录');
                var $img = $('#captcha-img');
                if ($img.length) $img.attr('src', $img.attr('src').replace(/&r=.*/, '') + '&r=' + Math.random());
            }
        },
        error: function() {
            alert('网络错误，请重试');
            $btn.prop('disabled', false).text('登 录');
        }
    });
});
</script>
</body>
</html>
