<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,delete')}
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('yunos/fund/edit')}"
                           data-operate-del="{:$auth->check('yunos/fund/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
    // 初始化表格参数配置
            Table.api.init({
                extend: {
                    index_url: 'yunos/fund/index' + location.search,
                    add_url: 'yunos/fund/add',
                    edit_url: 'yunos/fund/edit',
                    del_url: 'yunos/fund/del',
                    multi_url: 'yunos/fund/multi',
                    table: 'fund',
                }
            });

            var table = $("#table");

            // 初始化表格
            table.bootstrapTable({
                url: $.fn.bootstrapTable.defaults.extend.index_url,
                pk: 'id',
                sortName: 'id',
                showExport: false,
                columns: [
                    [
                        {checkbox: true},
                        
                        {field: 'id', title: __('Id'), searchable :false},
                        
                        {eq name="is_boss" value="true"}
                        {field: 'user_id', title: __('用户ID')},
                        {/eq}
                        
                        {field: 'action', title: __('Action'),
                            addClass: "selectpicker",
                            searchList: seachlist.action,
                            formatter: function(value, row){
                                return seachlist.action[value];
                            }
                        },
                        
                        {field: 'type', title: __('Type'),
                            addClass: "selectpicker",
                            searchList: seachlist.type,
                            formatter: function(value, row){
                                return seachlist.type[value];
                            }
                        },
                        
                        {field: 'value', title: __('Value'), operate:'BETWEEN', searchable :false},
                        
                        {field: 'content', title: __('Content'), operate: 'LIKE'},
                        
                        {field: 'createtime', title: __('Createtime'), operate:'RANGE', addclass:'datetimerange', autocomplete:false, formatter: Table.api.formatter.datetime},
                        
                        {field: 'operate', title: __('Operate'), table: table, events: Table.api.events.operate, formatter: Table.api.formatter.operate}
                    ]
                ]
            });
            
            // 为表格绑定事件
           Table.api.bindevent(table);
    
});
}
</script>
