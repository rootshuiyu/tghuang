<div class="panel panel-default panel-intro">
    
    <div class="panel-heading">
        {:build_heading(null,FALSE)}
        <ul class="nav nav-tabs" data-field="status">
            <li class="{:$Think.get.status === null ? 'active' : ''}"><a href="#t-all" data-value="" data-toggle="tab">{:__('All')}</a></li>
            {foreach name="seachlist.use" item="vo"}
            <li class="{:$Think.get.status === (string)$key ? 'active' : ''}"><a href="#t-{$key}" data-value="{$key}" data-toggle="tab">{$vo}</a></li>
            {/foreach}
        </ul>
    </div>


    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        
                        {:build_toolbar('refresh,delete')}
                        
                        

                        <div class="dropdown btn-group {:$auth->check('yunos/card/multi')?'':'hide'}">
                            <a class="yui-btn y-blue btn-more dropdown-toggle btn-disabled disabled" data-toggle="dropdown"><i class="fa fa-cog"></i> {:__('More')}</a>
                            <ul class="dropdown-menu text-left" role="menu">
                                {foreach name="seachlist.use" item="vo"}
                                <li><a class="btn btn-link btn-multi btn-disabled disabled" href="javascript:" data-params="use={$key}">设置为{$vo}</a></li>
                                {/foreach}
                            </ul>
                        </div>

                        
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('yunos/card/edit')}"
                           data-operate-del="{:$auth->check('yunos/card/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
    // 初始化表格参数配置
            Table.api.init({
                extend: {
                    index_url: 'yunos/card/index' + location.search,
                    add_url: 'yunos/card/add',
                    edit_url: 'yunos/card/edit',
                    del_url: 'yunos/card/del',
                    multi_url: 'yunos/card/multi',
                    table: 'card',
                }
            });

            var table = $("#table");

            // 初始化表格
            table.bootstrapTable({
                url: $.fn.bootstrapTable.defaults.extend.index_url,
                pk: 'id',
                sortName: 'id',
                showExport: true,
                //pageList: [10, 15, 20, 25, 100,300],
                columns: [
                    [
                        {checkbox: true},
                        {field: 'orderid', title: __('订单号'), operate: 'LIKE'},
                        {field: 'mid', title: __('Mid'), operate: 'LIKE'},
                        {field: 'value1', title: __('卡号'), searchable :false},
                        {field: 'value2', title: __('卡密'),searchable :false},
                        {field: 'fee', title: __('卡密金额'),searchable :false},
                        {field: 'use', title: __('Use'),searchable :false,
                            searchList: seachlist.use,
                            formatter: Table.api.formatter.status
                        },
                        
                        {field: 'createtime', title: __('Createtime'), operate:'RANGE', addclass:'datetimerange', autocomplete:false, formatter: Table.api.formatter.datetime},
                        {field: 'operate', title: __('Operate'), table: table, events: Table.api.events.operate, formatter: Table.api.formatter.operate}
                    ]
                ]
            });
            
            // 为表格绑定事件
           Table.api.bindevent(table);
    
});
}
</script>
