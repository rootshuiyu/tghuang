<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,delete,delete')}
                        

                        
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('yunos/fahuborder/edit')}"
                           data-operate-del="{:$auth->check('yunos/fahuborder/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
    // 初始化表格参数配置
            Table.api.init({
                extend: {
                    index_url: 'yunos/fahuborder/index' + location.search,
                    add_url: 'yunos/fahuborder/add',
                    edit_url: 'yunos/fahuborder/edit',
                    del_url: 'yunos/fahuborder/del',
                    multi_url: 'yunos/fahuborder/multi',
                    table: 'huborder',
                }
            });

            var table = $("#table");

            // 初始化表格
            table.bootstrapTable({
                url: $.fn.bootstrapTable.defaults.extend.index_url,
                pk: 'id',
                sortName: 'id',
                showExport: true,
                searchFormVisible:true,
                columns: [
                    [
                        {checkbox: true},
                        {field: 'id', title: __('Id'),searchable :false},
                        {field: 'name', title: __('Name') ,searchable :false},
                        {field: 'moudel', title: __('模型'), 
                            addClass: "selectpicker",
                            extend : 'data-live-search="true"',
                            searchList: seachlist.moudel,
                            formatter: function(value, row){
                                return seachlist.moudel[value];
                            },
                            
                        },
                        {field: 'value1', title: __('订单号'), operate: 'LIKE'},
                        {field: 'value2', title: __('值'), operate: 'LIKE',searchable :false},
                        {field: 'createtime', title: __('Createtime'), operate:'RANGE', addclass:'datetimerange', autocomplete:false, formatter: Table.api.formatter.datetime},
                        {field: 'operate', title: __('Operate'), table: table, events: Table.api.events.operate, formatter: Table.api.formatter.operate}
                    ]
                ]
            });
            
            // 为表格绑定事件
           Table.api.bindevent(table);
    
});
}
</script>
