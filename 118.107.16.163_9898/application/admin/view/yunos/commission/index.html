<div class="panel panel-default panel-intro">
    {:build_heading()}
    <div class="panel-body">
        <div class="widget-body no-padding">
            <div id="toolbar" class="toolbar">
                {:build_toolbar('refresh')}
            </div>
            <table id="table" class="table table-striped table-bordered table-hover table-nowrap" width="100%">
            </table>
        </div>
    </div>
</div>

<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
    Table.api.init({
        extend: {
            index_url: 'yunos/commission/index',
            table: 'fund',
        }
    });
    var table = $("#table");
    table.bootstrapTable({
        url: $.fn.bootstrapTable.defaults.extend.index_url,
        pk: 'id',
        sortName: 'id',
        sortOrder: 'desc',
        search: true,
        commonSearch: true,
        columns: [[
            {checkbox: true},
            {field: 'id', title: __('Id'), searchable: false},
            {field: 'user.nickname', title: '商户', searchable: false},
            {field: 'value', title: '抽佣金额', operate: 'BETWEEN', searchable: false},
            {field: 'content', title: '说明', operate: 'LIKE'},
            {field: 'createtime', title: '时间', operate: 'RANGE', addclass: 'datetimerange', formatter: Table.api.formatter.datetime}
        ]]
    });
    Table.api.bindevent(table);
});
};
</script>
