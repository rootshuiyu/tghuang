 <div class="col-sm-12 col-md-6">
        
        <div class="form-group">
            <label class="control-label col-xs-12 col-sm-2">{:__('单笔最小')}:</label>
            <div class="col-xs-3 col-sm-3">
                <input id="c-limit_min_fee" class="form-control" name="row[limit_min_fee]" type="text" value="{$row.limit_min_fee|htmlentities}" maxlength="10" onkeyup = "value=value.replace(/[^\d]/g,'')">
            </div>
            <label class="control-label col-xs-12 col-sm-2">{:__('单笔最大')}:</label>
            <div class="col-xs-3 col-sm-3">
                <input id="c-limit_max_fee" class="form-control" name="row[limit_max_fee]" type="text" value="{$row.limit_max_fee|htmlentities}" maxlength="10" onkeyup = "value=value.replace(/[^\d]/g,'')">
            </div>
            
        </div>
        
        <div class="form-group">
            
            <label class="control-label col-xs-12 col-sm-2">{:__('总限额')}:</label>
            <div class="col-xs-12 col-sm-8">
                <input id="c-limit_fee" class="form-control" name="row[limit_fee]" type="text" value="{$row.limit_fee|htmlentities}" maxlength="10" onkeyup = "value=value.replace(/[^\d]/g,'')">
            </div>
            
        </div>
        
        <div class="form-group">
            
            
            
            <label class="control-label col-xs-12 col-sm-2">{:__('日成功单量限制')}:</label>
            <div class="col-xs-12 col-sm-8">
                <input id="c-limit_day_in_number" class="form-control" name="row[limit_day_in_number]" type="text" value="{$row.limit_day_in_number|htmlentities}" maxlength="10">
                <code>0不限制</code>
            </div>
            
        </div>
        
        
        <div class="form-group">
            
            <label class="control-label col-xs-12 col-sm-2">{:__('日拉单量限制')}:</label>
            <div class="col-xs-12 col-sm-8">
                <input id="c-limit_day_pull_number" class="form-control" name="row[limit_day_pull_number]" type="text" value="{$row.limit_day_pull_number|htmlentities}" maxlength="10">
                <code>0不限制</code>
            </div>
            
        </div>
    
    
    </div>
