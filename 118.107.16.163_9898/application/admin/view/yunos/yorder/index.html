<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        {:build_toolbar('refresh,add,delete')}

                        

                        
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('yunos/yorder/edit')}"
                           data-operate-del="{:$auth->check('yunos/yorder/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
    // 初始化表格参数配置
            Table.api.init({
                extend: {
                    index_url: 'yunos/yorder/index' + location.search,
                    add_url: 'yunos/yorder/add',
                    edit_url: 'yunos/yorder/edit',
                    del_url: 'yunos/yorder/del',
                    multi_url: 'yunos/yorder/multi',
                    table: 'yorder',
                }
            });

            var table = $("#table");

            // 初始化表格
            table.bootstrapTable({
                url: $.fn.bootstrapTable.defaults.extend.index_url,
                pk: 'id',
                sortName: 'id',
                showExport: false,
                columns: [
                    [
                        {checkbox: true},
                        {field: 'id', title: __('Id')},
                        
                        {field: 'access.code', title: __('Access.code'), operate: 'LIKE'},
                        
                        {field: 'access.pay_type', title: __('Access.pay_type'),
                            searchList: seachlist.pay_type,
                            formatter: function(value, row){
                                return seachlist.pay_type[value];
                            }
                        },
                        
                        {field: 'account.mid', title: __('Account.mid'), operate: 'LIKE'},
                        
                        {field: 'syorder', title: __('Syorder'), operate: 'LIKE'},
                        
                        {field: 'fee', title: __('Fee'), operate:'BETWEEN'},
                        
                        {field: 'content', title: __('Content'), operate: 'LIKE', table: table, class: 'autocontent', formatter: Table.api.formatter.content},
                        
                        
                        
                        
                        {field: 'createtime', title: __('Createtime'), operate:'RANGE', addclass:'datetimerange', autocomplete:false, formatter: Table.api.formatter.datetime},
                        
                        {field: 'operate', title: __('Operate'), table: table, events: Table.api.events.operate, formatter: Table.api.formatter.operate}
                    ]
                ]
            });
            
            // 为表格绑定事件
           Table.api.bindevent(table);
    
});
}
</script>
