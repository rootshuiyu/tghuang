

<div class="form-group">
<style>
.info-container {
  margin-top:20px; /* 水平居中 */
  padding: 1.5rem 1.75rem; /* 内边距：上下1.5rem 左右1.75rem */
  background: #ffffff; /* 纯白背景更干净 */
  border-radius: 3px; /* 圆角更柔和 */

}

.info-title {
  margin: 0 0 0.75rem 0; /* 标题与内容间距 */
  font-size: 15px; /* 标题稍大 */
  color: #1a1a1a; /* 深灰标题更醒目 */
  line-height: 1.3; /* 行高更紧凑 */
}

.info-text {
  margin: 0;
  font-size: 14px; /* 正文稍小 */
  color: #f44336; /* 中灰正文更易读 */
  line-height: 1.6; /* 行高更宽松 */
}
</style>

<div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">接码平台账号:</label>
        <div class="col-xs-12 col-sm-12">
            {:Form::text('api_user', '', ['data-rule'=>''])}
        </div>
</div>

<div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">接码平台密码:</label>
        <div class="col-xs-12 col-sm-12">
            {:Form::text('api_pass', '', ['data-rule'=>''])}
        </div>
</div>

<div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">批量上号数量（最大30）:</label>
        <div class="col-xs-12 col-sm-12">
            {:Form::text('number', '30', ['data-rule'=>''])}
        </div>
</div>

<div class="form-group">
    <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-12">
            <button type="button" class="yui-btn btn-auto_login">开始上号</button>
        </div>
</div>
<div class="form-group">
        <label class="control-label col-xs-12 col-sm-2"></label>
<div class="col-xs-12 col-sm-12">
<div class="info-container">
  <h3 class="info-title">操作信息</h3>
  <di class="info-content">
      <p class="info-text">暂无</p>
  </div>
  
</div>
</div>
        </div>
</div>









<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
        
        $(document).on("click", ".btn-auto_login", function () {

            number = $('input[name="number"]').val();
            api_user = $('input[name="api_user"]').val();
            api_pass = $('input[name="api_pass"]').val();
            
            Fast.api.ajax({
               url:'/sup.php/yunos/account/app_load?ids={$row.id}&page=auto_login',
               data:{ids:'{$row.id}',number:number,api_user:api_user,api_pass:api_pass}
            }, function(data, ret){
                $('.info-content').before('<p class="info-text">'+ ret.msg +'</p>');
                layer.alert('操作结果<br/><code>'+ ret.msg  +'</code>');
                return
                
            }, function(data, ret){
                $('.info-content').before('<p class="info-text">'+ ret.msg +'</p>');
                return layer.alert('操作结果<br/><code>'+ ret.msg  +'</code>');
            });
            
        });
        
        
        
});
}
</script>
