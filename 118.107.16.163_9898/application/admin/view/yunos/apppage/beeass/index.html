

<div class="form-group" style="margin-bottom: 20px;">

<div class="form-group">
<style>
.info-container {
  margin-top:20px; /* 水平居中 */

}

  margin: 0 0 0.75rem 0; /* 标题与内容间距 */

}

  margin: 0;

<div class="info-container">
  <h3 class="info-title">操作信息</h3>
  <p class="info-text">无</p>
</div>
</div>

<div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('登录账号')}:</label>
        <div class="col-xs-12 col-sm-12">
            {:Form::text('account', $row.name, ['data-rule'=>''])}
        </div>
</div>



<div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('验证码')}:</label>
        <div class="col-xs-12 col-sm-12">
            {:Form::text('code', '', ['data-rule'=>''])}
        </div>
</div>



<div class="form-group">
    <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-12">
            <button type="button" class="yui-btn btn-send">点击登录</button>
        </div>
</div>

<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
    
        $(document).on("click", ".btn-send", function () {
           
           login_send()
            
        });
        
        function login_send(){

            account = $('input[name="account"]').val();
            code    = $('input[name="code"]').val();
            if(!account || !code){
                return Toastr.error('手机号与验证码不可为空');
            }
            
            Fast.api.ajax({
               url:'/sup.php/yunos/account/app_load?ids={$row.id}&page=h5_login',
               data:{ids:'{$row.id}',name:"名称",account:account,code:code}
            }, function(data, ret){
                $('.info-text').text(ret.msg);
                return layer.alert('操作结果<br/><code>'+ ret.msg  +'</code>');
            }, function(data, ret){
                return layer.alert('操作结果<br/><code>'+ ret.msg  +'</code>');
            });
            
        }
        
        $(document).on("click", ".btn-h5_login", function () {
            $(this).hide();
            $('#login_app').attr('src','https://promotion.phone580.com/activity/fzsapp-xch5/#/');
            $('.iframe-wrapper').show();
            
        });
     
        
        
});
}
</script>
