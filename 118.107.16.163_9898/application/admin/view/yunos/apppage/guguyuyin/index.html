            Fast.api.ajax({

               data:{ids:'{$row.id}',phone:phone}

                layer.alert(ret.msg);
                
            }, function(data, ret){
                layer.alert(ret.msg);
            });
            
            
            
        });

           code  = $('input[name="code"]').val();
