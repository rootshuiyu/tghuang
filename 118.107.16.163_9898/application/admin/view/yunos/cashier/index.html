<div class="panel panel-default panel-intro">
    {:build_heading()}
    <div class="panel-body">
        <div class="widget-body no-padding">
            <div id="toolbar" class="toolbar">
                {:build_toolbar('refresh')}
            </div>
            <table id="table" class="table table-striped table-bordered table-hover table-nowrap" width="100%">
            </table>
        </div>
    </div>
</div>

<script type="text/javascript">
const $PageApp = () => {
define(['jquery', 'bootstrap', 'backend', 'table', 'form'], function ($, undefined, Backend, Table, Form) {
    Table.api.init({
        extend: {
            index_url: 'yunos/cashier/index',
            table: 'cashier',
        }
    });
    var table = $("#table");
    table.bootstrapTable({
        url: $.fn.bootstrapTable.defaults.extend.index_url,
        pk: 'id',
        sortName: 'id',
        showExport: false,
        columns: [[
            {field: 'id', title: __('Id'), searchable: false},
            {field: 'name', title: '渠道名称', searchable: false},
            {field: 'pay_type_text', title: '支付方式', searchable: false},
            {field: 'pay_link', title: '收银台地址', formatter: function(value, row) {
                return '<div class="input-group"><input type="text" class="form-control input-sm url-text" value="'+value+'" readonly style="max-width:360px;">'+
                    '<span class="input-group-btn"><button type="button" class="btn btn-primary btn-sm btn-copy" data-url="'+value+'">复制</button></span></div>';
            }},
        ]]
    });
    $(document).on('click', '.btn-copy', function() {
        var url = $(this).data('url');
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(function() {
                Toastr.success('已复制到剪贴板');
            });
        } else {
            var $in = $('<input>').val(url).appendTo('body').select();
            document.execCommand('copy');
            $in.remove();
            Toastr.success('已复制到剪贴板');
        }
    });
    Table.api.bindevent(table);
});
};
</script>
